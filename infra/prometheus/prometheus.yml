global:
  scrape_interval: 15s

# 023 US7 (T541, FR-322/323): local alert rules — visible at :9090/alerts and in Grafana; no
# Alertmanager/notification service (Principle III). Runbooks live in monitoring/README.md.
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:8000']

  # The serving supervisor (:8090) and training daemon (:8091) run NATIVELY in WSL and each
  # expose /metrics, but they sit outside the container engine on a dynamic distro IP — a direct
  # scrape would be fragile. Instead the gateway polls their /health on each scrape and re-exports
  # their GPU/state as `mlops_gpu_free_mib`, `mlops_serving_resident`, `mlops_trainer_busy`,
  # `mlops_serving_up`, `mlops_trainer_up` (see gateway/app/platform_metrics.py) — so every
  # service's signal reaches Prometheus through the one gateway target above. (T043)

  # 018 US2 (FR-174): the GPU host agent is scraped DIRECTLY, so GPU/holder/engine/job signals
  # stay observable when the gateway is down (the pre-018 observability SPOF, review §4.4). The agent
  # runs NATIVELY in WSL on a dynamic distro IP that `host.docker.internal` can't reach across WSL
  # distros (it resolves to the docker bridge, not the Ubuntu agent). So the target is FILE-BASED:
  # up_all.ps1 writes the injected distro IP into targets/hostagent.json and Prometheus hot-reloads it
  # (no restart). The committed default is the same-distro `host.docker.internal` fallback.
  - job_name: hostagent
    metrics_path: /metrics
    file_sd_configs:
      - files: ['/etc/prometheus/targets/hostagent.json']
        refresh_interval: 30s
