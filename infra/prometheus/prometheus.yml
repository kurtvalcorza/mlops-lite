global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:8000']

  # The serving supervisor (:8090) and training daemon (:8091) run NATIVELY in WSL and each
  # expose /metrics, but they sit outside the container engine on a dynamic distro IP — a direct
  # scrape would be fragile. Instead the gateway polls their /health on each scrape and re-exports
  # their GPU/state as `mlops_gpu_free_mib`, `mlops_serving_resident`, `mlops_trainer_busy`,
  # `mlops_serving_up`, `mlops_trainer_up` (see gateway/app/platform_metrics.py) — so every
  # service's signal reaches Prometheus through the one gateway target above. (T043)

  # 018 US2 (FR-174): the GPU host agent is scraped DIRECTLY, so GPU/holder/engine/job signals
  # stay observable when the gateway is down (the pre-018 observability SPOF, review §4.4).
  # `host.docker.internal` needs the compose extra_hosts host-gateway mapping; on cross-distro
  # WSL setups serve_up.ps1 rewrites this target with the injected distro IP, like the *_URL vars.
  - job_name: hostagent
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8100']
