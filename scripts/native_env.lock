# Native WSL execution environment — exact versions (002 US4, T058 / Principle VI reproducibility).
# These pin the GPU-specific torch-family wheels that requirements.txt intentionally leaves to the
# CUDA index, so a clean machine reproduces the verified environment. Installed into ~/mlops-train
# by scripts/bootstrap.sh. Reference hardware: RTX 5070 Ti Laptop (Blackwell, capability sm_120).
#
# CUDA wheel index for all torch-family packages:
#   --index-url https://download.pytorch.org/whl/cu128
torch==2.11.0+cu128
torchvision==0.26.0+cu128

