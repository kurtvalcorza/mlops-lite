name: mlops-lite

# Phase 1–2 foundational stack: Postgres + MinIO + MLflow (registry) + gateway + observability.
# GPU services (serving/training) are added later via docker-compose.gpu.yml.

services:
  postgres:
    image: postgres:17.10-alpine  # 007 US2: pin the minor (was 17-alpine; PG_VERSION 17.10, captured T118)
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlops}
      # Secret — no inline default; bring-up fails fast if unset (FR-017). Run scripts/gen_secrets.
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (run scripts/gen_secrets)}"
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # 005 US1 (FR-041): bind loopback by default; BIND_ADDR=0.0.0.0 for intentional LAN exposure.
      - "${BIND_ADDR:-127.0.0.1}:${POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlops}"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    # 007 US2: pinned (was :latest). MinIO CVE-2025-62506 (session-policy bypass) is unpatched on Docker
    # Hub's frozen 2025-09-07 tag; the fix ships as the quay.io hotfix of that release
    # (RELEASE.2025-09-07T16-13-09Z.hotfix.7aa24e772 — go1.26.1, Apr-2026, console retained). Pinned BY
    # DIGEST (not the hotfix tag) for immutability + guaranteed resolution on a fresh host — `docker
    # manifest inspect` confirms this digest (the hotfix's amd64 manifest list) is published on quay.
    # Codex P1/P2, PR#3. Same behavior as the validated 2025-09-07, just patched.
    image: quay.io/minio/minio@sha256:cf3dadcfa1fb0324f43958bad1abba986d53c4ecc04d4d50b46c7dcda28bd3cd
    command: server /data --console-address ":9001"
    environment:
      # Secrets — no shipped minioadmin/minioadmin defaults (FR-017). Run scripts/gen_secrets.
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env (run scripts/gen_secrets)}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env (run scripts/gen_secrets)}"
    volumes:
      - miniodata:/data
    ports:
      # 005 US1 (FR-041): loopback-only by default (BIND_ADDR override for LAN).
      - "${BIND_ADDR:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${BIND_ADDR:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"

  # One-shot: create the platform buckets, then exit (T008).
  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z  # 007 US2: pin (was :latest, captured T118)
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env (run scripts/gen_secrets)}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env (run scripts/gen_secrets)}"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb -p local/datasets local/models local/results local/mlflow;
      echo 'buckets ready';
      "

  mlflow:
    build: ./infra/mlflow
    depends_on:
      postgres:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env (run scripts/gen_secrets)}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env (run scripts/gen_secrets)}"
      AWS_DEFAULT_REGION: us-east-1
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/mlflow
      --artifacts-destination s3://mlflow
      --serve-artifacts
      --allowed-hosts ${MLFLOW_ALLOWED_HOSTS:-mlflow:5000,localhost:5000,127.0.0.1:5000,localhost:${MLFLOW_PORT:-5500},127.0.0.1:${MLFLOW_PORT:-5500}}
    ports:
      # 005 US1 (FR-041): loopback-only by default (BIND_ADDR override for LAN).
      - "${BIND_ADDR:-127.0.0.1}:${MLFLOW_PORT:-5500}:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  gateway:
    build:
      # Repo root, not ./gateway (Codex round 4, 018): the image COPYs BOTH gateway/app and the
      # shared platformlib package, so the built image runs outside this compose file too
      # (contracts/platformlib.md — no bind-mount-only dependency). .dockerignore keeps the
      # context small.
      context: .
      dockerfile: gateway/Dockerfile
    depends_on:
      mlflow:
        condition: service_started
      createbuckets:
        condition: service_completed_successfully
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # 006 inference tracing — pass the .env toggles INTO the container so they actually take effect
      # (default-on when unset, matching app/tracing.py defaults). FR-052 / SC-034.
      MLFLOW_TRACING_ENABLED: ${MLFLOW_TRACING_ENABLED:-1}
      MLFLOW_TRACE_CAPTURE_IO: ${MLFLOW_TRACE_CAPTURE_IO:-1}
      MLFLOW_TRACING_EXPERIMENT: ${MLFLOW_TRACING_EXPERIMENT:-mlops-lite-inference}
      # API-key auth (US1, FR-016; fail-closed since 005/US2). Comma-separated keys; empty => protected
      # routes return 401 unless GATEWAY_ALLOW_OPEN. scripts/gen_secrets provisions a real key.
      GATEWAY_API_KEYS: ${GATEWAY_API_KEYS:-}
      # 005 US2 (FR-042): fail-closed by default. No key => protected routes 401, UNLESS this
      # truthy dev override runs the gateway open (logged loudly). Never the default.
      GATEWAY_ALLOW_OPEN: ${GATEWAY_ALLOW_OPEN:-}
      # GPU host agent on the WSL host (018). The SINGLE endpoint since T364 folded every engine
      # (llm/asr/vision/embed/tabular) AND the jobs surface into one process; the gateway derives each
      # per-engine base (`${AGENT_URL}/engines/<id>`) + the legacy /train|/classify|/transcribe|…
      # byte-compatible paths from it (gateway/app/settings.py). up_all.ps1 injects the Ubuntu IP
      # since host.docker.internal can't cross WSL distros.
      AGENT_URL: ${AGENT_URL:-http://host.docker.internal:8100}
      SERVING_MODEL: ${SERVING_MODEL:-qwen2.5-7b-instruct-q4_k_m}
      # MinIO/S3 for the dataset registry (US3).
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env (run scripts/gen_secrets)}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env (run scripts/gen_secrets)}"
      AWS_DEFAULT_REGION: us-east-1
      # 011 eval harness — the held-out benchmark fixtures are bind-mounted read-only (not baked
      # into the image) because they're operator-extendable by design: drop a new fixture in and
      # re-run, no rebuild (benchmarks/README → BENCHMARKS_DIR override).
      BENCHMARKS_DIR: /benchmarks
    volumes:
      - ./benchmarks:/benchmarks:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # 005 US1 (FR-041): loopback-only by default (BIND_ADDR override for LAN).
      - "${BIND_ADDR:-127.0.0.1}:${GATEWAY_PORT:-8080}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v3.5.4  # 007 US2: pin (was :latest, captured T118)
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # 018 FR-174: file_sd target for the native host agent — up_all.ps1 writes the injected WSL IP
      # here so the DIRECT agent scrape works cross-distro; Prometheus hot-reloads it (no restart).
      - ./infra/prometheus/targets:/etc/prometheus/targets:ro
    extra_hosts:
      # 018 (FR-174): direct scrape of the native host agent (:8100) — same host-gateway mapping
      # the gateway uses to reach the native daemons.
      - "host.docker.internal:host-gateway"
    ports:
      # 005 US1 (FR-041): loopback-only by default (BIND_ADDR override for LAN).
      - "${BIND_ADDR:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    # 007 US2: pinned (was :latest). `grafana/grafana:13.1.0` IS a published Docker Hub tag (verified by a
    # clean untag+re-pull), but pinned BY DIGEST for immutability + to make the "is this tag published"
    # question moot (mirrors the MinIO digest pin). Digest = the 13.1.0 manifest list. Codex P1, PR#3.
    image: grafana/grafana@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      # Secret — no shipped admin/admin default (FR-017). Run scripts/gen_secrets.
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:?set GRAFANA_PASSWORD in .env (run scripts/gen_secrets)}"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      # Allow the operator console (003 US2) to embed dashboard panels via iframe. Anonymous view is
      # already on; this drops the X-Frame-Options deny so localhost framing works (FR-029).
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # 004 US1 (FR-036): scope the embed so ONLY the console origin may frame Grafana — Grafana's own
      # CSP frame-ancestors limited to http://localhost:3000, not the blanket allow-any that
      # allow_embedding alone leaves. (Grafana is anonymous + read-only, but this closes clickjacking.)
      GF_SECURITY_CONTENT_SECURITY_POLICY: "true"
      GF_SECURITY_CONTENT_SECURITY_POLICY_TEMPLATE: "frame-ancestors 'self' http://localhost:3000 http://127.0.0.1:3000;"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    ports:
      # 005 US1 (FR-041): loopback-only by default (BIND_ADDR override for LAN).
      - "${BIND_ADDR:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  miniodata:
  grafanadata:
